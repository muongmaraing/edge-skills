<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Web Search</title></head><body><script>
// DuckDuckGo JSONP search
function ddgSearch(q){return new Promise(r=>{const c='d_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),s=document.createElement('script'),t=setTimeout(()=>{delete window[c];s.remove();r(null)},8000);window[c]=d=>{clearTimeout(t);delete window[c];s.remove();let o='';if(d.AbstractText)o+=d.AbstractText;if(d.Answer)o+=(o?'\n\n':'')+d.Answer;if(d.Definition)o+=(o?'\n\n':'')+d.Definition;if(d.RelatedTopics?.length){const tp=d.RelatedTopics.filter(x=>x.Text).slice(0,4).map(x=>'• '+x.Text).join('\n');if(tp)o+='\n\n'+tp}r(o.trim()||null)};s.onerror=()=>{clearTimeout(t);delete window[c];s.remove();r(null)};s.src='https://api.duckduckgo.com/?'+new URLSearchParams({q,format:'json',no_html:'1',skip_disambig:'1',callback:c});document.head.appendChild(s)})}
// Wikipedia
async function wikiSearch(topic,lang){const b='https://'+(lang||'en')+'.wikipedia.org/w/api.php';try{const sr=await fetch(b+'?'+new URLSearchParams({action:'query',format:'json',generator:'search',gsrsearch:topic,gsrlimit:'1',prop:'extracts',explaintext:'1',exintro:'1',origin:'*'}));const sd=await sr.json();if(!sd.query?.pages)return null;const pg=Object.values(sd.query.pages)[0];let o=(pg.extract||'');return o.substring(0,2000)}catch(e){return null}}

window['ai_edge_gallery_get_result']=async(data)=>{
  try{
    const p=JSON.parse(data);
    const query=p.query||'';
    const lang=p.lang||'en';
    if(!query) return 'Please provide a search query.';

    const [ddg,wiki]=await Promise.all([ddgSearch(query),wikiSearch(query,lang)]);

    // Format as a complete conversational answer the model can just repeat
    let answer='Here is what I found about "'+query+'":\n\n';
    if(ddg) answer+=ddg;
    if(wiki) answer+=(ddg?'\n\n':'')+wiki;
    if(!ddg&&!wiki) answer='I searched for "'+query+'" but found no results.';

    // Return plain text, NOT JSON — model treats this as final answer
    return answer;
  }catch(e){return 'Search failed: '+e.message+'. Please try again with different keywords.'}
};
</script></body></html>
