<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Khmer Assistant</title></head><body><script>
// DuckDuckGo with Khmer support
function ddgSearch(q){return new Promise(r=>{const c='k_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),s=document.createElement('script'),t=setTimeout(()=>{delete window[c];s.remove();r(null)},8000);window[c]=d=>{clearTimeout(t);delete window[c];s.remove();let o='';if(d.AbstractText)o+=d.AbstractText;if(d.Answer)o+=(o?'\n\n':'')+d.Answer;if(d.RelatedTopics?.length){const tp=d.RelatedTopics.filter(x=>x.Text).slice(0,5).map(x=>'• '+x.Text).join('\n');if(tp)o+='\n\n'+tp}r(o.trim()||null)};s.onerror=()=>{clearTimeout(t);delete window[c];s.remove();r(null)};s.src='https://api.duckduckgo.com/?'+new URLSearchParams({q,format:'json',no_html:'1',skip_disambig:'1',callback:c});document.head.appendChild(s)})}
// Wikipedia with language support
async function wikiSearch(topic,lang){const b=`https://${lang||'en'}.wikipedia.org/w/api.php`;try{const sr=await fetch(b+'?'+new URLSearchParams({action:'query',format:'json',generator:'search',gsrsearch:topic,gsrlimit:'1',prop:'extracts',explaintext:'1',exintro:'1',origin:'*'}));const sd=await sr.json();if(!sd.query?.pages)return null;const pg=Object.values(sd.query.pages)[0];return(pg.title||topic)+'\n\n'+(pg.extract||'').substring(0,4000)}catch(e){return null}}
// Google Translate
async function translate(text,from,to){try{const url='https://translate.googleapis.com/translate_a/single?client=gtx&sl='+(from||'auto')+'&tl='+(to||'en')+'&dt=t&q='+encodeURIComponent(text);const res=await fetch(url);const data=await res.json();if(data&&data[0])return data[0].map(x=>x[0]).join('');return null}catch(e){return null}}
// Khmer news via RSS
async function khmerNews(topic){try{const q=topic||'កម្ពុជា';const r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent('https://news.google.com/rss/search?q='+encodeURIComponent(q)+'&hl=km&gl=KH&ceid=KH:km'));const d=await r.json();if(d.items?.length)return d.items.slice(0,5).map((x,i)=>(i+1)+'. '+x.title+'\n   '+x.pubDate).join('\n\n');return null}catch(e){return null}}

window['ai_edge_gallery_get_result']=async(data)=>{
  try{
    const p=JSON.parse(data);
    if(p.action==='search'){
      const q=p.query||p.topic||'';
      const lang=p.lang||'km';
      const [ddg,wiki]=await Promise.all([ddgSearch(q),wikiSearch(q,lang)]);
      let out='';
      if(ddg) out+=ddg;
      if(wiki) out+=(out?'\n\n':'')+wiki;
      return JSON.stringify({result:out||'រកមិនឃើញលទ្ធផលសម្រាប់: '+q});
    }
    if(p.action==='translate'){
      const r=await translate(p.text,p.from||'auto',p.to||'km');
      return JSON.stringify({result:r||'ការបកប្រែបរាជ័យ',from:p.from||'auto',to:p.to||'km'});
    }
    if(p.action==='news'){
      const r=await khmerNews(p.topic);
      return JSON.stringify({result:r||'រកមិនឃើញព័ត៌មាន'});
    }
    return JSON.stringify({error:'Unknown action: '+p.action+'. Use: search, translate, news'});
  }catch(e){return JSON.stringify({error:e.message})}
};
</script></body></html>
