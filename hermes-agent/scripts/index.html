<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Hermes Agent</title></head>
<body><script>
function ddgSearch(q){return new Promise(r=>{const c='d_'+Date.now(),s=document.createElement('script'),t=setTimeout(()=>{delete window[c];s.remove();r(null)},8000);window[c]=d=>{clearTimeout(t);delete window[c];s.remove();let o='';if(d.AbstractText)o+=d.AbstractText;if(d.Answer)o+=(o?'\n\n':'')+d.Answer;if(d.RelatedTopics?.length)o+='\n\n'+d.RelatedTopics.filter(x=>x.Text).slice(0,4).map(x=>'• '+x.Text).join('\n');r(o.trim()||null)};s.onerror=()=>{clearTimeout(t);delete window[c];s.remove();r(null)};s.src='https://api.duckduckgo.com/?'+new URLSearchParams({q,format:'json',no_html:'1',skip_disambig:'1',callback:c});document.head.appendChild(s)})}
async function wikiSearch(topic,lang){try{const b='https://'+(lang||'en')+'.wikipedia.org/w/api.php',sr=await fetch(b+'?'+new URLSearchParams({action:'query',format:'json',generator:'search',gsrsearch:topic,gsrlimit:'1',prop:'extracts',explaintext:'1',exintro:'1',origin:'*'}));const sd=await sr.json();if(!sd.query?.pages)return null;const pg=Object.values(sd.query.pages)[0];return(pg.extract||'').substring(0,2000)}catch(e){return null}}
async function getWeather(city){try{const g=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(city)+'&count=1&format=json');const gd=await g.json();if(!gd.results?.length)return null;const{latitude,longitude,name,country}=gd.results[0];const w=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+latitude+'&longitude='+longitude+'&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=auto');const wd=await w.json();const c=wd.current;const codes={0:'Clear',1:'Clear',2:'Partly cloudy',3:'Overcast',45:'Fog',51:'Drizzle',61:'Rain',80:'Showers',95:'Thunderstorm'};return name+', '+country+': '+(codes[c.weather_code]||'Unknown')+', '+c.temperature_2m+'C (feels '+c.apparent_temperature+'C), Humidity '+c.relative_humidity_2m+'%, Wind '+c.wind_speed_10m+' km/h'}catch(e){return null}}
function calc(expr){try{const s=expr.replace(/\^/g,'**').replace(/sqrt\(/g,'Math.sqrt(');const r=Function('"use strict";return('+s+')')();if(typeof r==='number'&&isFinite(r))return expr+' = '+r;return null}catch(e){return null}}
async function translateText(text,from,to){try{const r=await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl='+(from||'auto')+'&tl='+(to||'en')+'&dt=t&q='+encodeURIComponent(text));const d=await r.json();return d&&d[0]?d[0].map(x=>x[0]).join(''):null}catch(e){return null}}
async function currencyConvert(amount,from,to){try{const r=await fetch('https://api.frankfurter.app/latest?amount='+amount+'&from='+(from||'usd')+'&to='+(to||'khr'));const d=await r.json();if(d.rates)return amount+' '+from.toUpperCase()+' = '+d.rates[to.toUpperCase()]+' '+to.toUpperCase();return null}catch(e){return null}}

window['ai_edge_gallery_get_result']=async(data)=>{
  try{
    const p=JSON.parse(data);
    const tool=p.tool||'web_search';
    // Return PLAIN TEXT for all tools — model treats it as final answer
    if(tool==='web_search'){
      const q=p.query||'',l=p.lang||'en';
      const[ddg,wiki]=await Promise.all([ddgSearch(q),wikiSearch(q,l)]);
      let a='';if(ddg)a+=ddg;if(wiki)a+=(a?'\n\n':'')+wiki;
      return a||'No results found for "'+q+'".';
    }
    if(tool==='weather'){
      return await getWeather(p.city||'Phnom Penh')||'Weather not found.';
    }
    if(tool==='calculate'){
      const r=calc(p.expression);
      return r||'Cannot calculate: '+p.expression;
    }
    if(tool==='translate'){
      return await translateText(p.text,p.from||'auto',p.to||'en')||'Translation failed.';
    }
    if(tool==='currency'){
      return await currencyConvert(p.amount||1,p.from||'usd',p.to||'khr')||'Conversion failed.';
    }
    if(tool==='memory_save'){
      const s=JSON.parse(localStorage.getItem('hm')||'{}');
      s[p.key]={value:p.value,time:new Date().toISOString()};
      localStorage.setItem('hm',JSON.stringify(s));
      return 'Saved: '+p.key;
    }
    if(tool==='memory_recall'){
      const s=JSON.parse(localStorage.getItem('hm')||'{}');
      const ks=Object.keys(s);
      return ks.length?ks.map(k=>k+': '+s[k].value.substring(0,100)).join('\n'):'No memories.';
    }
    if(tool==='web_fetch'){
      try{const proxy='https://api.allorigins.win/raw?url=',res=await fetch(proxy+encodeURIComponent(p.url||''));
      if(!res.ok)return 'Failed to fetch: '+p.url;
      const html=await res.text(),doc=new DOMParser().parseFromString(html,'text/html');
      doc.querySelectorAll('script,style,nav,header,footer').forEach(e=>e.remove());
      return(doc.body?.innerText||'').replace(/\n{3,}/g,'\n\n').trim().substring(0,3000)||'[No text]';}
      catch(e){return 'Fetch error: '+e.message;}
    }
    return 'Unknown tool: '+tool+'. Use: web_search, weather, calculate, translate, currency.';
  }catch(e){return 'Error: '+e.message+'. Try again with valid JSON.'}
};
</script></body></html>
