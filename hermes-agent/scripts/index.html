<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hermes Agent</title>
</head>
<body>
<script>
// ============================================================
// HERMES AGENT — Multi-Tool Execution Engine
// For Google AI Edge Gallery + Gemma 4
// ============================================================

// --- TOOL: DuckDuckGo Search (JSONP, no CORS issues) ---
function ddgSearch(query) {
  return new Promise((resolve) => {
    const cb = 'ddg_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    const script = document.createElement('script');
    const timeout = setTimeout(() => { delete window[cb]; script.remove(); resolve(null); }, 8000);
    window[cb] = (d) => {
      clearTimeout(timeout); delete window[cb]; script.remove();
      let out = '';
      if (d.AbstractText) out += d.AbstractText;
      if (d.Answer) out += (out ? '\n\n' : '') + 'Answer: ' + d.Answer;
      if (d.Definition) out += (out ? '\n\n' : '') + 'Definition: ' + d.Definition;
      if (d.RelatedTopics?.length) {
        const topics = d.RelatedTopics.filter(t => t.Text).slice(0,5).map(t => '• ' + t.Text).join('\n');
        if (topics) out += '\n\nRelated:\n' + topics;
      }
      if (d.Results?.length) {
        const results = d.Results.slice(0,3).map(r => '• ' + r.Text + ' — ' + r.FirstURL).join('\n');
        if (results) out += '\n\nWeb Results:\n' + results;
      }
      resolve(out.trim() || null);
    };
    script.onerror = () => { clearTimeout(timeout); delete window[cb]; script.remove(); resolve(null); };
    script.src = 'https://api.duckduckgo.com/?' + new URLSearchParams({q:query,format:'json',no_html:'1',skip_disambig:'1',callback:cb});
    document.head.appendChild(script);
  });
}

// --- TOOL: Wikipedia Search ---
async function wikiSearch(topic, lang) {
  const base = `https://${lang||'en'}.wikipedia.org/w/api.php`;
  try {
    const sr = await fetch(base + '?' + new URLSearchParams({action:'query',format:'json',generator:'search',gsrsearch:topic,gsrlimit:'1',prop:'extracts',explaintext:'1',exintro:'1',origin:'*'}));
    const sd = await sr.json();
    if (!sd.query?.pages) return null;
    const page = Object.values(sd.query.pages)[0];
    let out = 'Title: ' + (page.title || topic) + '\n\n' + (page.extract || '');
    // Try infobox
    try {
      const pr = await fetch(base + '?' + new URLSearchParams({action:'parse',page:page.title,section:'0',prop:'text',format:'json',origin:'*'}));
      const pd = await pr.json();
      const html = pd?.parse?.text?.['*'];
      if (html) {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const infobox = doc.querySelector('table.infobox');
        if (infobox) {
          let ib = '';
          infobox.querySelectorAll('tr').forEach(row => {
            const th = row.querySelector('th'), td = row.querySelector('td');
            if (th && td) ib += th.textContent.replace(/\[\d+\]/g,'').trim() + ': ' + td.textContent.replace(/\[\d+\]/g,'').trim().replace(/\n+/g,' | ') + '\n';
          });
          if (ib) out = '=== INFOBOX ===\n' + ib + '\n=== SUMMARY ===\n' + out;
        }
      }
    } catch(e) {}
    const max = (lang==='zh'||lang==='ja'||lang==='ko') ? 1500 : 4000;
    if (out.length > max) out = out.substring(0,max) + '\n...[truncated]';
    return out;
  } catch(e) { return null; }
}

// --- TOOL: Web Fetch (via allorigins CORS proxy) ---
async function webFetch(url) {
  try {
    const proxy = 'https://api.allorigins.win/raw?url=';
    const res = await fetch(proxy + encodeURIComponent(url));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const html = await res.text();
    // Extract text from HTML
    const doc = new DOMParser().parseFromString(html, 'text/html');
    // Remove scripts, styles, nav
    doc.querySelectorAll('script, style, nav, header, footer, iframe, noscript').forEach(e => e.remove());
    const text = (doc.body?.innerText || doc.body?.textContent || '').replace(/\n{3,}/g,'\n\n').trim();
    return text.substring(0, 5000) || '[Page fetched but no readable text found]';
  } catch(e) {
    // Fallback: try direct fetch
    try {
      const res = await fetch(url);
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      doc.querySelectorAll('script, style, nav, header, footer').forEach(e => e.remove());
      const text = (doc.body?.innerText || '').replace(/\n{3,}/g,'\n\n').trim();
      return text.substring(0, 5000) || '[No readable text]';
    } catch(e2) {
      return null;
    }
  }
}

// --- TOOL: Memory (localStorage) ---
function memorySave(key, value) {
  try {
    const store = JSON.parse(localStorage.getItem('hermes_memory') || '{}');
    store[key] = { value, saved: new Date().toISOString() };
    localStorage.setItem('hermes_memory', JSON.stringify(store));
    return 'Saved: ' + key;
  } catch(e) { return 'Memory save failed: ' + e.message; }
}
function memoryRecall(key) {
  try {
    const store = JSON.parse(localStorage.getItem('hermes_memory') || '{}');
    if (key) {
      return store[key] ? JSON.stringify(store[key]) : null;
    }
    // Return all keys
    const keys = Object.keys(store);
    if (keys.length === 0) return 'No memories stored yet.';
    return keys.map(k => k + ': ' + store[k].value.substring(0,100)).join('\n');
  } catch(e) { return null; }
}
function memoryDelete(key) {
  try {
    const store = JSON.parse(localStorage.getItem('hermes_memory') || '{}');
    if (store[key]) { delete store[key]; localStorage.setItem('hermes_memory', JSON.stringify(store)); return 'Deleted: ' + key; }
    return 'Key not found: ' + key;
  } catch(e) { return 'Delete failed: ' + e.message; }
}

// --- TOOL: Calculator ---
function calculate(expression) {
  try {
    // Sanitize: only allow safe math characters
    const sanitized = expression.replace(/[^0-9+\-*/().%^,\s]|(\^)/g, (m,p) => p ? '**' : '');
    if (!sanitized.trim()) return null;
    const result = Function('"use strict"; return (' + sanitized + ')')();
    if (typeof result !== 'number' || !isFinite(result)) return null;
    // Format nicely
    if (Number.isInteger(result)) return result.toString();
    return parseFloat(result.toPrecision(12)).toString();
  } catch(e) { return null; }
}

// --- TOOL: Translation (via Google Translate unofficial API) ---
async function translateText(text, from, to) {
  try {
    const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=' + (from||'auto') + '&tl=' + (to||'en') + '&dt=t&q=' + encodeURIComponent(text);
    const res = await fetch(url);
    const data = await res.json();
    if (data && data[0]) {
      return data[0].map(x => x[0]).join('');
    }
    return null;
  } catch(e) {
    // Fallback: try LibreTranslate
    try {
      const res = await fetch('https://libretranslate.com/translate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({q: text, source: from||'auto', target: to||'en', format: 'text'})
      });
      const data = await res.json();
      return data.translatedText || null;
    } catch(e2) { return null; }
  }
}

// --- TOOL: Weather (Open-Meteo, free, no API key) ---
async function getWeather(city) {
  try {
    // Step 1: Geocode city to coordinates
    const geoRes = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1&language=en&format=json');
    const geoData = await geoRes.json();
    if (!geoData.results?.length) return null;
    const {latitude, longitude, name, country} = geoData.results[0];
    // Step 2: Get weather
    const wRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude=' + latitude + '&longitude=' + longitude + '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=auto');
    const wData = await wRes.json();
    const c = wData.current;
    // WMO weather codes
    const codes = {0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Rime fog',51:'Light drizzle',53:'Moderate drizzle',55:'Dense drizzle',61:'Slight rain',63:'Moderate rain',65:'Heavy rain',71:'Slight snow',73:'Moderate snow',75:'Heavy snow',80:'Rain showers',95:'Thunderstorm',96:'Thunderstorm with hail',99:'Thunderstorm with heavy hail'};
    return `${name}, ${country}: ${codes[c.weather_code]||'Unknown'}, ${c.temperature_2m}°C (feels like ${c.apparent_temperature}°C), Humidity: ${c.relative_humidity_2m}%, Wind: ${c.wind_speed_10m} km/h`;
  } catch(e) { return null; }
}

// --- TOOL: Currency Conversion (via frankfurter.app, free) ---
async function currencyConvert(amount, from, to) {
  try {
    const res = await fetch('https://api.frankfurter.app/latest?amount=' + amount + '&from=' + (from||'usd') + '&to=' + (to||'khr'));
    const data = await res.json();
    if (data.rates && data.rates[to.toUpperCase()]) {
      return amount + ' ' + from.toUpperCase() + ' = ' + data.rates[to.toUpperCase()] + ' ' + to.toUpperCase() + ' (rate: ' + data.rates[to.toUpperCase()]/amount + ')';
    }
    return null;
  } catch(e) { return null; }
}

// ============================================================
// MAIN ENTRY POINT — Called by AI Edge Gallery
// ============================================================
window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    const input = JSON.parse(data);
    let results = [];

    // Support both single tool and multi-tool
    const tools = input.tools || [input];

    for (const t of tools) {
      const tool = t.tool;
      try {
        if (tool === 'web_search' || tool === 'search') {
          const q = t.query || t.topic || '';
          const topic = t.topic || t.query || '';
          const lang = t.lang || 'en';
          const [ddg, wiki] = await Promise.all([ddgSearch(q), wikiSearch(topic, lang)]);
          let r = '';
          if (ddg) r += '=== DuckDuckGo ===\n' + ddg;
          if (wiki) r += (r?'\n\n':'') + '=== Wikipedia ===\n' + wiki;
          results.push(r || 'No results for: ' + q);
        }
        else if (tool === 'web_fetch' || tool === 'fetch') {
          const url = t.url;
          if (!url) { results.push('Error: url required'); continue; }
          const text = await webFetch(url);
          results.push(text || 'Failed to fetch: ' + url);
        }
        else if (tool === 'memory_save' || tool === 'save') {
          results.push(memorySave(t.key, t.value));
        }
        else if (tool === 'memory_recall' || tool === 'recall') {
          const r = memoryRecall(t.key || null);
          results.push(r || (t.key ? 'No memory found for: ' + t.key : 'No memories stored'));
        }
        else if (tool === 'memory_delete' || tool === 'delete') {
          results.push(memoryDelete(t.key));
        }
        else if (tool === 'calculate' || tool === 'calc' || tool === 'math') {
          const r = calculate(t.expression);
          results.push(r !== null ? t.expression + ' = ' + r : 'Cannot calculate: ' + t.expression);
        }
        else if (tool === 'translate') {
          const r = await translateText(t.text, t.from||'auto', t.to||'en');
          results.push(r || 'Translation failed');
        }
        else if (tool === 'weather') {
          const r = await getWeather(t.city);
          results.push(r || 'Weather not found for: ' + t.city);
        }
        else if (tool === 'currency') {
          const r = await currencyConvert(t.amount||1, t.from||'usd', t.to||'khr');
          results.push(r || 'Currency conversion failed');
        }
        else {
          results.push('Unknown tool: ' + tool + '. Available: web_search, web_fetch, memory_save, memory_recall, memory_delete, calculate, translate, weather, currency');
        }
      } catch(err) {
        results.push('Tool ' + tool + ' error: ' + err.message);
      }
    }

    return JSON.stringify({ results });
  } catch(e) {
    return JSON.stringify({ error: 'Hermes Agent error: ' + e.message });
  }
};
</script>
</body>
